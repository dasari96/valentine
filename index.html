<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valentine 💝</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fce4ec;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
      position: relative;
    }

    .petal {
      position: fixed;
      top: -30px;
      font-size: 1.2rem;
      animation: fall linear infinite;
      pointer-events: none;
      opacity: 0.7;
      z-index: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(233,30,99,0.15);
      max-width: 520px;
      width: 90%;
      position: relative;
      z-index: 10;
      overflow: hidden;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: #222;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 40px;
      letter-spacing: 0.04em;
    }

    #btn-area {
      position: relative;
      width: 100%;
      height: 200px;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e91e63, #f06292);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(233,30,99,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }
    .btn-yes:hover {
      transform: translateX(-50%) scale(1.06);
      box-shadow: 0 10px 32px rgba(233,30,99,0.45);
    }

    .btn-no {
      background: #fff;
      color: #555;
      border: 1.5px solid #ddd;
      border-radius: 50px;
      padding: 13px 28px;
      font-size: 0.88rem;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
    }

    #yes-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: popIn 0.5s ease;
    }
    @keyframes popIn {
      0%   { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    #yes-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #e91e63;
    }
    #yes-screen p {
      color: #888;
      font-size: 0.95rem;
    }
    .big-heart {
      font-size: 4rem;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.18); }
    }
  </style>
</head>
<body>

  <script>
    const symbols = ['🌸','💗','🌷','💕','✿','❀','💖'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      document.body.appendChild(p);
    }
  </script>

  <div class="card">
    <div id="main-screen">
      <h1>UDAYASRI,<br>will you be my Valentine? 💗💝</h1>
      <p class="subtitle"
